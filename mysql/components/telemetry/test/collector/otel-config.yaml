receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

#
# IN PROGRESS
#
# FOR TLS, need to copy the certs inside the docker image first.
#
#        tls:
#          ca_file: /data/malff/CERT-LAB/ca.pem
#          cert_file: /data/malff/CERT-LAB/server_cert.pem
#          key_file: /data/malff/CERT-LAB/server_cert-key.pem
#          min_version: "1.2"
#          max_version: "1.3"

processors:
  batch:
  memory_limiter:
    # 75% of maximum memory up to 4G
    limit_mib: 1536
    # 25% of limit up to 2G
    spike_limit_mib: 512
    check_interval: 5s

exporters:
  debug:
    verbosity: detailed

#  file:
#    path: ./mysql-telemetry.json

  # Forward to jaeger in OTLP/HTTP
  otlphttp/jaeger:
    endpoint: "http://jaeger:4318"

  # Forward to zipkin
  zipkin:
    endpoint: "http://zipkin:9411/api/v2/spans"

  # Forward to loki in OTLP/HTTP
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"

# # Data sources: metrics
#   prometheus:
#     endpoint: "localhost:8889"
#     namespace: "default"

  # Forward metrics to Prometheus
  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"
    # For official Prometheus (e.g. running via Docker)
    # endpoint: 'http://prometheus:9090/api/v1/write'
    # tls:
    #   insecure: true


service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, otlphttp/jaeger, zipkin]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug, otlphttp/loki]

