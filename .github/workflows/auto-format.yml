name: Auto-format code

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: read

jobs:
  auto-format:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'format please') &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.data.head.ref);
            core.setOutput('repo', pr.data.head.repo.full_name);
            core.setOutput('same_repo', String(pr.data.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`));

      - name: Checkout PR branch
        if: steps.pr.outputs.same_repo == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}
          repository: ${{ steps.pr.outputs.repo }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Set up JDK
        if: steps.pr.outputs.same_repo == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: 'temurin'
          cache: maven

      - name: Apply formatting
        if: steps.pr.outputs.same_repo == 'true'
        run: mvn -B -Pformatting spotless:apply

      - name: Get last commit author
        if: steps.pr.outputs.same_repo == 'true'
        id: author
        run: |
          echo "name=$(git log -1 --format='%an')" >> "$GITHUB_OUTPUT"
          echo "email=$(git log -1 --format='%ae')" >> "$GITHUB_OUTPUT"

      - name: Commit and push formatting changes
        if: steps.pr.outputs.same_repo == 'true'
        run: |
          git config user.name "${{ steps.author.outputs.name }}"
          git config user.email "${{ steps.author.outputs.email }}"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting changes needed."
          else
            git commit -m "Auto-format code"
            git push
          fi