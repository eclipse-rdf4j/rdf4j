id: join-associate-right
kind: TRANSFORMATION
phase: CHEAP_LOGICAL
promise: 70
match:
  op: JOIN
  as: j
  inputs:
    - capture: a
    - op: JOIN
      as: rightJoin
      inputs:
        - capture: b
        - capture: c
guards:
  - name: barrierFree
    args: [j]
  - name: barrierFree
    args: [rightJoin]
emit:
  name: join
  args:
    - name: join
      args:
        - ref: a
        - ref: b
    - ref: c
proof:
  - innerJoin
  - associative
  - scopeSafe
reason: right-deep JOIN association is a bag-semantics preserving alternative
